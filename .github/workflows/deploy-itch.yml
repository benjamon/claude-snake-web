name: Deploy to itch.io

on:
  push:
    branches:
      - itch-live

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build for itch.io
        run: |
          npx vite build --base ''
          node scripts/inline-itch.cjs

      - name: Deploy to itch.io
        uses: yeslayla/butler-publish-itchio-action@v2.0.2
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: html5
          ITCH_GAME: ${{ vars.ITCH_GAME }}
          ITCH_USER: ${{ vars.ITCH_USER }}
          PACKAGE: dist-itch/
