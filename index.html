let W, H, gCell, gScale, gBoardX, gBoardY, gUiH, gCellScale;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  gScale = H / 1080;
  gUiH = Math.max(36, Math.round(50 * gScale));
  const margin = Math.round(H * 0.10);
  gCell = Math.min(
    Math.floor((W - 2*margin) / COLS),
    Math.floor((H - 2*margin - gUiH) / ROWS)
  );
  gCellScale = gCell / 20;
  const boardW = gCell * COLS, boardH = gCell * ROWS;
  gBoardX = Math.round((W - boardW) / 2);
  gBoardY = Math.round((H - boardH - gUiH) / 2);
}
window.addEventListener('resize', resize);

function brighten(arr, t) {

// ================================================================
// WEB AUDIO
// ================================================================
let audioCtx = null;
let masterGain = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.45;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function makeOsc(type='sine', freq, start, stop, gain, gStart=null, gEnd=null, freqEnd=null) {
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.type = type;
  osc.connect(g); g.connect(masterGain);
  osc.frequency.setValueAtTime(freq, start);
  if (freqEnd !== null) osc.frequency.linearRampToValueAtTime(freqEnd, stop);
  g.gain.setValueAtTime(gStart ?? gain, start);
  if (gEnd !== null) g.gain.linearRampToValueAtTime(gEnd, stop);
  osc.start(start); osc.stop(stop);
  return osc;
}

function sndEat() {
  ensureAudio(); const t = audioCtx.currentTime, dur = 0.10;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.connect(g); g.connect(masterGain);
  osc.frequency.setValueAtTime(300, t);
  osc.frequency.linearRampToValueAtTime(1050, t+dur);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.50, t+dur*0.08);
  g.gain.linearRampToValueAtTime(0, t+dur);
  osc.start(t); osc.stop(t+dur);
}
function sndDie() {
  ensureAudio(); const t = audioCtx.currentTime;
  const o1 = audioCtx.createOscillator();
  const o2 = audioCtx.createOscillator();
  const g  = audioCtx.createGain();
  o1.connect(g); o2.connect(g); g.connect(masterGain);
  o1.type = 'sine'; o2.type = 'square';
  [o1,o2].forEach(o => {
    o.frequency.setValueAtTime(380, t);
    o.frequency.exponentialRampToValueAtTime(68, t+0.55);
  });
  g.gain.setValueAtTime(0.45, t); g.gain.linearRampToValueAtTime(0, t+0.55);
  o1.start(t); o1.stop(t+0.55); o2.start(t); o2.stop(t+0.55);
}
function sndVictory() {
  ensureAudio(); const t = audioCtx.currentTime;
  [523.25,659.25,783.99,1046.50].forEach((freq,i) => {
    const st = t + i*0.20;
    makeOsc('sine', freq, st, st+0.35, 0.35, 0.35, 0.001);
  });
}
function sndPortal() {
  ensureAudio(); const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.connect(g); g.connect(masterGain);
  osc.frequency.setValueAtTime(80, t);
  osc.frequency.exponentialRampToValueAtTime(1800, t+0.45);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.38, t+0.02);
  g.gain.setValueAtTime(0.38, t+0.29);
  g.gain.linearRampToValueAtTime(0, t+0.45);
  osc.start(t); osc.stop(t+0.45);
}
function sndTunnelPickup() {
  ensureAudio(); const t = audioCtx.currentTime, dur = 0.18;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.connect(g); g.connect(masterGain);
  osc.frequency.setValueAtTime(600, t);
  osc.frequency.linearRampToValueAtTime(2400, t+dur);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.35, t+dur*0.06);
  g.gain.linearRampToValueAtTime(0, t+dur);
  osc.start(t); osc.stop(t+dur);
}
function sndTunnelActivate() {
  ensureAudio(); const t = audioCtx.currentTime;
  // thump
  makeOsc('sine', 80, t, t+0.15, 0.5, 0.5, 0.001, 40);
  // buzz (written explicitly — makeOsc can't express a mid-envelope ramp-up)
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.type = 'sawtooth'; osc.connect(g); g.connect(masterGain);
  osc.frequency.setValueAtTime(300, t); osc.frequency.linearRampToValueAtTime(900, t+0.30);
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.28, t+0.05);
  g.gain.linearRampToValueAtTime(0, t+0.30);
  osc.start(t); osc.stop(t+0.30);
}
function sndHaloPickup() {
  ensureAudio(); const t = audioCtx.currentTime;
  [[880,0.32],[1320,0.18],[1760,0.10]].forEach(([f,a]) =>
    makeOsc('sine', f, t, t+0.40, a, a, 0.001)
  );
}
function sndHaloSave() {
  ensureAudio(); const t = audioCtx.currentTime;
  [[523.25,0.32],[659.25,0.22],[1046.50,0.16],[1318.51,0.08]].forEach(([f,a]) => {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.connect(g); g.connect(masterGain);
    osc.frequency.value = f;
    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(a, t+0.015);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.55);
    osc.start(t); osc.stop(t+0.55);
  });
}

// ---- Background music ----
// Tries to load bgmusic.ogg / bgmusic.mp3 / bgmusic.wav from the same directory.
// Falls back to a procedural synth loop if no file is found or on file:// protocol.

let bgAudio = null;      // HTMLAudioElement for file playback
let bgRunning = false, bgTimer = null;
let bgUsingFile = false;

function bgPickSrc() {
  // Return the first format this browser claims to support
  const tmp = new Audio();
  const candidates = [['bgmusic.ogg','audio/ogg'],['bgmusic.mp3','audio/mpeg'],['bgmusic.wav','audio/wav']];
  for (const [file, mime] of candidates) {
    if (tmp.canPlayType(mime) !== '') return file;
  }
  return null;
}

// Procedural fallback
const BG_BPM = 120, BG_SPB = 60/BG_BPM, BG_LOOP = 8*BG_SPB*1000;
const BG_MEL  = [[261.63,0,0.85],[329.63,1,0.85],[392.00,2,0.85],[523.25,3,0.85],
                 [392.00,4,0.85],[329.63,5,0.85],[261.63,6,1.80]];
const BG_BASS = [[130.81,0,0.45],[130.81,2,0.45],[98.00,4,0.45],[130.81,6,0.45]];

function bgScheduleLoop() {
  if (!bgRunning || !audioCtx) return;
  const now = audioCtx.currentTime;
  const addNote = (freq, beat, durBeats, amp) => {
    const t = now + beat*BG_SPB, dur = durBeats*BG_SPB*0.85;
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.connect(g); g.connect(masterGain);
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(amp, t+0.02);
    g.gain.setValueAtTime(amp, t+dur*0.65);
    g.gain.linearRampToValueAtTime(0, t+dur);
    osc.start(t); osc.stop(t+dur+0.05);
  };
  BG_MEL.forEach(([f,b,d])  => addNote(f,b,d,0.14));
  BG_BASS.forEach(([f,b,d]) => addNote(f,b,d,0.20));
  bgTimer = setTimeout(bgScheduleLoop, BG_LOOP - 100);
}

async function startBgMusic() {
  if (bgRunning) return;
  ensureAudio(); bgRunning = true;

  const src = bgPickSrc();
  if (src) {
    if (!bgAudio) {
      bgAudio = new Audio();
      bgAudio.loop = true;
      bgAudio.volume = 0.45; // match masterGain level
      bgAudio.src = src;
    }
    try {
      await bgAudio.play();
      bgUsingFile = true;
      return;
    } catch(e) {
      // File not found, network error, or blocked — fall through to synth
      console.warn('[bgm] file playback failed, using synth:', e.message);
    }
  }
  bgScheduleLoop();
}

function stopBgMusic() {
  bgRunning = false;
  if (bgAudio && bgUsingFile) { bgAudio.pause(); }
  if (bgTimer) { clearTimeout(bgTimer); bgTimer = null; }
}

function genUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0;
    return (c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}

let playerId     = localStorage.getItem('sn_id')   || (() => { const id=genUUID(); localStorage.setItem('sn_id',id); return id; })();

function saveConfig() {
  localStorage.setItem('sn_name', playerName);
  localStorage.setItem('sn_best', personalBest);
}

// ================================================================
// PARTICLES + FLOAT TEXTS
// ================================================================
let particles = [], floatTexts = [];

function burst(bx, by, count, spMin, spMax, szMin, szMax, liMin, liMax, colors) {
  const SP=2.0, SZ=2.0, LI=2.0;
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const sp  = (spMin + Math.random()*(spMax-spMin)) * SP;
    const col = colors[Math.floor(Math.random()*colors.length)];
    const li  = (liMin + Math.random()*(liMax-liMin)) * LI;
    particles.push({ x:bx, y:by, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp,
      sz: (szMin+Math.random()*(szMax-szMin)) * SZ, li, liMax:li, col });
  }
}
function floatText(bx, by, text, col) {
  floatTexts.push({ x:bx, y:by, text, col, li:0.9, vy:-55 });
}
function updateFX(dt) {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.li-=dt;
    if(p.li<=0) particles.splice(i,1);
  }
  for (let i=floatTexts.length-1;i>=0;i--) {
    const f=floatTexts[i]; f.y+=f.vy*dt; f.li-=dt;
    if(f.li<=0) floatTexts.splice(i,1);
  }
}

function deathExplosion(snake) {
  for (const s of snake) {
    burst(s.x*gCell+gCell/2, s.y*gCell+gCell/2, 3, 20,100, 2,6, 0.2,0.5,
      [[80,220,80],[140,255,100],[220,255,80],[255,255,255]]);
  }
}
function foodExplosion(bx,by) {
  burst(bx,by,14,40,150,3,7,0.25,0.55,[C.FOOD,[255,160,120],[255,220,80]]);
}

// ================================================================
// GAME STATE
// ================================================================
let state = playerName ? S.MENU : S.SETUP;
let gTime = 0, shakeX=0, shakeY=0, shakeMag=0;

let snake, snakeGhost, dir, inputQ;
let food, foodSpawnTime;
let score, tickRate, tick, startDelay;
let deathBlocks, deathBlockFlash, tunnelPowerups, haloPowerups, wallEvents, portalPairs;
let phaseTicks, stepCount, portalCooldown, tunnelCharges, haloCharges;

function rnd(lo,hi) { return lo + Math.floor(Math.random()*(hi-lo+1)); }

function cellOccupied(c, skipFood=false) {
  for (const s of snake) if (s.x===c.x && s.y===c.y) return true;
  if (!skipFood && food && food.x===c.x && food.y===c.y) return true;
  for (const b of deathBlocks)    if (b.x===c.x && b.y===c.y) return true;
  for (const t of tunnelPowerups) if (t.x===c.x && t.y===c.y) return true;
  for (const h of haloPowerups)   if (h.x===c.x && h.y===c.y) return true;
  for (const pp of portalPairs)
    if ((pp.a.x===c.x&&pp.a.y===c.y)||(pp.b.x===c.x&&pp.b.y===c.y)) return true;
  return false;
}

function trySpawn(lo, hi, fn) {
  for (let i=0;i<300;i++) {
    const c={x:rnd(lo,hi), y:rnd(lo,hi)};
    if (!cellOccupied(c)) { fn(c); return; }
  }
}
function trySpawnFood() {
  while(true) {
    const c={x:rnd(0,COLS-1), y:rnd(0,ROWS-1)};
    if (!cellOccupied(c,true)) return c;
  }
}
function trySpawnDeathBlock() {
  const head = snake[0];
  for (let i=0;i<300;i++) {
    const c={x:rnd(0,COLS-1), y:rnd(0,ROWS-1)};
    if (Math.abs(c.x-head.x)+Math.abs(c.y-head.y)<6) continue;
    if (!cellOccupied(c)) { deathBlocks.push(c); deathBlockFlash.push(1.0); return; }
  }
}
function spawnPortalPair() {
  if (portalPairs.length >= PORTAL_COLORS.length) return;
  const color = PORTAL_COLORS[portalPairs.length];
  for (let ta=0;ta<500;ta++) {
    const ca={x:rnd(1,COLS-2), y:rnd(1,ROWS-2)};
    if (cellOccupied(ca)) continue;
    for (let tb=0;tb<500;tb++) {
      const cb={x:rnd(1,COLS-2), y:rnd(1,ROWS-2)};
      if (Math.abs(cb.x-ca.x)+Math.abs(cb.y-ca.y)<5) continue;
      if (cellOccupied(cb)) continue;
      portalPairs.push({a:ca, b:cb, color, spawnTime:gTime});
      burst(ca.x*gCell+gCell/2, ca.y*gCell+gCell/2, 10, 40,160, 3,8, 0.3,0.6, [color,[255,255,255]]);
      burst(cb.x*gCell+gCell/2, cb.y*gCell+gCell/2, 10, 40,160, 3,8, 0.3,0.6, [color,[255,255,255]]);
      return;
    }
  }
}
function spawnWall() {
  const horizontal = Math.random()<0.5;
  const lineIdx = rnd(0,(horizontal?ROWS:COLS)-1);
  wallEvents.push({horizontal, lineIdx, warningSteps:10, stepsRemaining:-1, cells:[]});
}

function reset() {
  const mx=COLS/2|0, my=ROWS/2|0;
  snake      = [{x:mx+1,y:my},{x:mx,y:my},{x:mx-1,y:my}];
  snakeGhost = [false,false,false];
  dir = {x:1,y:0}; inputQ=[];
  score=0; tick=0; tickRate=0.156; startDelay=3.0;
  deathBlocks=[]; deathBlockFlash=[]; tunnelPowerups=[]; haloPowerups=[];
  wallEvents=[]; portalPairs=[];
  phaseTicks=0; stepCount=0; portalCooldown=0; tunnelCharges=0; haloCharges=0;
  particles=[]; floatTexts=[]; shakeMag=0;
  spawnPortalPair();
  food=trySpawnFood(); foodSpawnTime=gTime;
  trySpawn(0,COLS-1, c=>tunnelPowerups.push(c));
}

// ================================================================
// INPUT
// ================================================================
const keys={}, jp={};
const DIRS = {
  ArrowUp:{x:0,y:-1},KeyW:{x:0,y:-1},
  ArrowDown:{x:0,y:1},KeyS:{x:0,y:1},
  ArrowLeft:{x:-1,y:0},KeyA:{x:-1,y:0},
  ArrowRight:{x:1,y:0},KeyD:{x:1,y:0},
};

window.addEventListener('keydown', e => {
  const wasDown = keys[e.code];
  keys[e.code] = true;
  if (!wasDown) jp[e.code] = true;

  if (state===S.PLAY) {
    if (DIRS[e.code]) {
      const d=DIRS[e.code];
      const last=inputQ.length?inputQ[inputQ.length-1]:dir;
      if (d.x!==-last.x||d.y!==-last.y) {
        if (d.x!==last.x||d.y!==last.y) if(inputQ.length<3) inputQ.push(d);
      }
      e.preventDefault();
    }
    if (e.code==='Space') {
      if (tunnelCharges>0&&phaseTicks===0) {
        tunnelCharges--; phaseTicks=10; sndTunnelActivate();
      }
      e.preventDefault();
    }
    if (e.code==='Escape') { state=S.MENU; e.preventDefault(); }
  }
  if (e.code==='ArrowUp'||e.code==='ArrowDown'||e.code==='Space') e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code]=false; });

function pressed(code) { if(jp[code]){jp[code]=false;return true;} return false; }

// SETUP / NAME EDIT INPUT
// ================================================================
let nameBuf = playerName || '';
let nameEditing = false; // for in-game name change

window.addEventListener('keydown', e => {
  if (nameInputActive) return;
  if (state===S.SETUP) {
    if (e.key==='Backspace') { nameBuf=nameBuf.slice(0,-1); e.preventDefault(); return; }
    if (e.key==='Enter'&&nameBuf.trim()) {
      playerName=nameBuf.trim(); saveConfig(); state=S.MENU; startBgMusic();
      e.preventDefault(); return;
    }
    if (e.key.length===1&&nameBuf.length<16) { nameBuf+=e.key; e.preventDefault(); return; }
  }
  if ((state===S.MENU||state===S.DEAD)&&!nameEditing&&e.code==='KeyN') {
    nameEditing=true; nameBuf=playerName; e.preventDefault();
  }
  if (nameEditing) {
    if (e.key==='Backspace') nameBuf=nameBuf.slice(0,-1);
    else if (e.key==='Enter') {
      if(nameBuf.trim()){playerName=nameBuf.trim();saveConfig();} nameEditing=false;
    }
    else if (e.key==='Escape') nameEditing=false;
    else if (e.key.length===1&&nameBuf.length<16) nameBuf+=e.key;
    e.preventDefault();
  }
});

// ================================================================
// TOUCH CONTROLS
// ================================================================
const hasTouch = navigator.maxTouchPoints > 0;

// Touch zones — cleared each frame, populated during draw
let touchZones = [];
function addZone(x, y, w, h, action) { touchZones.push({x,y,w,h,action}); }
function hitZone(cx, cy) {
  for (const z of touchZones)
    if (cx>=z.x && cx<=z.x+z.w && cy>=z.y && cy<=z.y+z.h) { z.action(); return true; }
  return false;
}

// Hidden <input> so the native mobile keyboard appears for text entry
const nameInput = document.createElement('input');
nameInput.type = 'text';
nameInput.setAttribute('autocomplete','off');
nameInput.setAttribute('autocorrect','off');
nameInput.setAttribute('autocapitalize','none');
nameInput.setAttribute('spellcheck','false');
nameInput.style.cssText = 'position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;top:-100px;left:0;border:none;outline:none;';
document.body.appendChild(nameInput);
let nameInputActive = false;

nameInput.addEventListener('input', () => {
  nameBuf = nameInput.value.slice(0, 16);
});
nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (state === S.SETUP) {
      if (nameBuf.trim()) { playerName=nameBuf.trim(); saveConfig(); state=S.MENU; startBgMusic(); }
    } else if (nameEditing) {
      if (nameBuf.trim()) { playerName=nameBuf.trim(); saveConfig(); }
      nameEditing = false;
    }
    nameInputActive = false; nameInput.blur(); e.preventDefault();
  }
  if (e.key === 'Escape') {
    nameEditing = false; nameInputActive = false; nameInput.blur(); e.preventDefault();
  }
});
nameInput.addEventListener('blur', () => { nameInputActive = false; });

function focusNameInput() {
  nameInputActive = true;
  nameInput.value = nameBuf;
  nameInput.style.pointerEvents = 'auto';
  nameInput.focus();
  nameInput.style.pointerEvents = 'none';
}

// Swipe for movement, tap for zones
let swipeX0 = 0, swipeY0 = 0;
const SWIPE_MIN = 30;

canvas.addEventListener('touchstart', e => {
  e.preventDefault(); ensureAudio();
  const t = e.touches[0]; swipeX0 = t.clientX; swipeY0 = t.clientY;
}, {passive: false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!e.changedTouches.length) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - swipeX0, dy = t.clientY - swipeY0;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  // Swipe in PLAY → queue direction
  if (state === S.PLAY && startDelay <= 0 && (ax > SWIPE_MIN || ay > SWIPE_MIN)) {
    let d;
    if (ax > ay) d = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
    else         d = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
    const last = inputQ.length ? inputQ[inputQ.length-1] : dir;
    if (d.x !== -last.x || d.y !== -last.y)
      if (d.x !== last.x || d.y !== last.y) if (inputQ.length < 3) inputQ.push(d);
    return;
  }
  hitZone(t.clientX, t.clientY);
}, {passive: false});

// ================================================================
// PALETTE EDITOR STATE
// ================================================================
let palEditKey = C_KEYS[0];
let palEditCh  = 0; // 0=R, 1=G, 2=B

// ================================================================
// UPDATE
// ================================================================
function update(dt) {
  gTime += dt;
  updateFX(dt);
  onlineSubmitFeedback = Math.max(0, onlineSubmitFeedback-dt);
  shakeMag = Math.max(0, shakeMag - dt*80);
  shakeX = (Math.random()*2-1)*shakeMag;
  shakeY = (Math.random()*2-1)*shakeMag;

  // --- Global key handling (not in play state for directional keys) ---
  if (pressed('KeyP')) {
    if (state===S.MENU||state===S.DEAD) state=S.PALETTE;
    else if (state===S.PALETTE)         state=S.MENU;
  }

  if (state===S.MENU||state===S.DEAD) {
    if (!nameEditing) {
      if (pressed('Enter')||pressed('NumpadEnter')) {
        ensureAudio(); reset(); state=S.PLAY; startBgMusic();
      }
      if (pressed('ArrowUp'))   { palIdx=(palIdx-1+PALETTES.length)%PALETTES.length; applyPalette(palIdx); }
      if (pressed('ArrowDown')) { palIdx=(palIdx+1)%PALETTES.length; applyPalette(palIdx); }
    }
    if (state===S.DEAD&&!nameEditing&&pressed('Escape')) { state=S.MENU; fetchLeaderboard(); }
  }

  if (state===S.PALETTE) {
    const kidx = C_KEYS.indexOf(palEditKey);
    if (pressed('ArrowUp'))   palEditKey=C_KEYS[(kidx-1+C_KEYS.length)%C_KEYS.length];
    if (pressed('ArrowDown')) palEditKey=C_KEYS[(kidx+1)%C_KEYS.length];
    if (pressed('KeyQ'))      palEditCh=(palEditCh+2)%3;
    if (pressed('KeyE'))      palEditCh=(palEditCh+1)%3;
    if (keys['ArrowLeft'])    C[palEditKey][palEditCh]=Math.max(0,   C[palEditKey][palEditCh]-2);
    if (keys['ArrowRight'])   C[palEditKey][palEditCh]=Math.min(255, C[palEditKey][palEditCh]+2);
    if (pressed('Escape'))    state=S.MENU;
  }

  if (state!==S.PLAY) return;

  // --- PLAY ---
  for(let i=0;i<deathBlockFlash.length;i++)
    deathBlockFlash[i]=Math.max(0,deathBlockFlash[i]-dt*3);

  if (startDelay>0) { startDelay-=dt; tick=0; return; }
  tick+=dt;

  if (tick>=tickRate&&portalCooldown>0) { tick=0; portalCooldown--; return; }
  if (tick<tickRate) return;
  tick=0;

  if (inputQ.length) dir=inputQ.shift();

  let head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  let phasing=(phaseTicks>0);

  if (phasing) {
    head.x=((head.x%COLS)+COLS)%COLS;
    head.y=((head.y%ROWS)+ROWS)%ROWS;
  }

  // Portals
  for (const pp of portalPairs) {
    const hitA=head.x===pp.a.x&&head.y===pp.a.y;
    const hitB=head.x===pp.b.x&&head.y===pp.b.y;
    if (hitA||hitB) {
      const from=hitA?pp.a:pp.b, to=hitA?pp.b:pp.a;
      head={...to}; portalCooldown=1; sndPortal();
      for (let s=0;s<=12;s++) {
        const t=s/12;
        burst(
          (from.x+(to.x-from.x)*t)*gCell+gCell/2,
          (from.y+(to.y-from.y)*t)*gCell+gCell/2,
          3, 20,70, 2,5, 0.25,0.55, [pp.color, C.PHASE_HEAD]
        );
      }
      break;
    }
  }

  // Death check
  let dead=false;
  if (!phasing) {
    dead=head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS;
    if(!dead) for(let i=0;i<snake.length;i++)
      if(!snakeGhost[i]&&snake[i].x===head.x&&snake[i].y===head.y){dead=true;break;}
    if(!dead) for(const b of deathBlocks)
      if(b.x===head.x&&b.y===head.y){dead=true;break;}
    if(!dead) for(const w of wallEvents)
      if(w.stepsRemaining>0) for(const c of w.cells)
        if(c.x===head.x&&c.y===head.y){dead=true;break;}
  }

  // Halo save
  if (dead&&haloCharges>0) {
    haloCharges--; phaseTicks=10; phasing=true;
    head.x=((head.x%COLS)+COLS)%COLS;
    head.y=((head.y%ROWS)+ROWS)%ROWS;
    dead=false; sndHaloSave(); shakeMag=3;
    burst(head.x*gCell+gCell/2, head.y*gCell+gCell/2,
      18, 30,120, 3,7, 0.3,0.7, [[255,220,80],[255,255,200]]);
  }

  if (dead) {
    deathExplosion(snake); shakeMag=6;
    const newBest=score>personalBest;
    if(newBest){personalBest=score;saveConfig();submitScore(playerName,score);onlineSubmitFeedback=2.5;}
    state=S.DEAD;
    if(newBest)sndVictory();else sndDie();
    return;
  }

  // Collect powerups
  for(let i=tunnelPowerups.length-1;i>=0;i--)
    if(tunnelPowerups[i].x===head.x&&tunnelPowerups[i].y===head.y)
      {tunnelCharges++;tunnelPowerups.splice(i,1);sndTunnelPickup();break;}
  for(let i=haloPowerups.length-1;i>=0;i--)
    if(haloPowerups[i].x===head.x&&haloPowerups[i].y===head.y)
      {haloCharges++;haloPowerups.splice(i,1);sndHaloPickup();break;}

  const ate=head.x===food.x&&head.y===food.y;
  snake.unshift(head); snakeGhost.unshift(phasing);

  if (ate) {
    const fx=food.x*gCell+gCell/2, fy=food.y*gCell+gCell/2;
    foodExplosion(fx,fy);
    const pts=1+(stepCount/100|0);
    floatText(fx, food.y*gCell, `+${pts}`, C.FOOD);
    if(!phasing) sndEat();
    score+=pts; food=trySpawnFood(); foodSpawnTime=gTime;
    tickRate=Math.max(0.055,tickRate-0.0008);
    if(phasing){snake.pop();snakeGhost.pop();}
  } else { snake.pop(); snakeGhost.pop(); }

  if(phaseTicks>0)phaseTicks--;
  stepCount++;

  if(stepCount%50===0)  trySpawnDeathBlock();
  if(stepCount%100===0) trySpawn(0,COLS-1,c=>tunnelPowerups.push(c));
  if(stepCount%200===0) trySpawn(0,COLS-1,c=>haloPowerups.push(c));
  if(stepCount>0&&stepCount%250===0) spawnPortalPair();
  if(stepCount>0&&stepCount%300===0) spawnWall();

  // Wall timers
  for(const w of wallEvents) {
    if(w.warningSteps>0) {
      if(--w.warningSteps===0) {
        w.stepsRemaining=50;
        const len=w.horizontal?COLS:ROWS;
        for(let i=0;i<len;i++)
          w.cells.push(w.horizontal?{x:i,y:w.lineIdx}:{x:w.lineIdx,y:i});
      }
    } else if(w.stepsRemaining>0) w.stepsRemaining--;
  }
}

// ================================================================
// DRAW HELPERS
// ================================================================
function TS(n) { return Math.max(8, Math.round(n * gScale)); }

function drawText(text, x, y, sz, col, align='left', base='top') {
  ctx.font=`bold ${sz}px monospace`;
  ctx.fillStyle=col; ctx.textAlign=align; ctx.textBaseline=base;
  ctx.fillText(text,x,y);
}
function centered(text,y,sz,col) { drawText(text,W/2,y,sz,col,'center','top'); }
function measured(text,sz) { ctx.font=`bold ${sz}px monospace`; return ctx.measureText(text).width; }

function drawBtn(label, x, y, w, h, fillCol, textCol, action) {
  const r = Math.min(8, h/4);
  ctx.fillStyle = fillCol;
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  ctx.fill();
  const sz = Math.min(Math.round(h*0.50), TS(20));
  ctx.font = `bold ${sz}px monospace`;
  ctx.fillStyle = textCol; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x+w/2, y+h/2);
  if (action) addZone(x, y, w, h, action);
}

// ================================================================
// DRAW
// ================================================================
function draw() {
  touchZones.length = 0;
  // Background
  ctx.fillStyle=rgb('BG');
  ctx.fillRect(0,0,W,H);

  if (state===S.SETUP)   { drawSetup();   return; }
  if (state===S.PALETTE) { drawPalette(); return; }
  if (state===S.MENU)    { drawMenu();    return; }

  // PLAY or DEAD
  drawGame();
  if (state===S.DEAD) drawDead();
}

function drawGame() {
  const boardW=gCell*COLS, boardH=gCell*ROWS;
  const ox=gBoardX+shakeX|0, oy=gBoardY+shakeY|0;

  ctx.save();
  ctx.translate(ox,oy);

  // Border
  const bp=(Math.sin(gTime*1.4)+1)*0.5;
  ctx.fillStyle=rgbA(brighten(C.BOARD_BOR,bp*0.25));
  const border=Math.max(2,gCell/12|0);
  ctx.fillRect(-border,-border,boardW+2*border,boardH+2*border);

  // Board
  ctx.fillStyle=rgb('BOARD_BG');
  ctx.fillRect(0,0,boardW,boardH);

  // Grid
  ctx.strokeStyle=rgb('GRID'); ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=0;x<=COLS;x++){ctx.moveTo(x*gCell,0);ctx.lineTo(x*gCell,boardH);}
  for(let y=0;y<=ROWS;y++){ctx.moveTo(0,y*gCell);ctx.lineTo(boardW,y*gCell);}
  ctx.stroke();

  // Wall events
  for(const w of wallEvents) {
    if(w.warningSteps>0) {
      const fl=(Math.sin(gTime*14)+1)*0.5;
      ctx.fillStyle=rgbA(C.WALL, fl*0.35);
      if(w.horizontal) ctx.fillRect(0,w.lineIdx*gCell,boardW,gCell);
      else             ctx.fillRect(w.lineIdx*gCell,0,gCell,boardH);
    } else if(w.stepsRemaining>0) {
      const a=Math.min(1,w.stepsRemaining/10)*0.65;
      ctx.fillStyle=rgbA(C.WALL,a);
      if(w.horizontal) ctx.fillRect(0,w.lineIdx*gCell,boardW,gCell);
      else             ctx.fillRect(w.lineIdx*gCell,0,gCell,boardH);
    }
  }

  // Death blocks
  for(let i=0;i<deathBlocks.length;i++) {
    const b=deathBlocks[i], fl=deathBlockFlash[i]||0;
    ctx.fillStyle=rgb('BLOCK');
    ctx.fillRect(b.x*gCell+1,b.y*gCell+1,gCell-2,gCell-2);
    if(fl>0){ctx.fillStyle=rgbA(C.BLOCK_MARK,fl);ctx.fillRect(b.x*gCell+1,b.y*gCell+1,gCell-2,gCell-2);}
    ctx.strokeStyle=rgbA(C.BLOCK_MARK,0.8);
    ctx.lineWidth=Math.max(1,gCell/8);
    const m=gCell*0.25;
    ctx.beginPath();
    ctx.moveTo(b.x*gCell+m,b.y*gCell+m); ctx.lineTo(b.x*gCell+gCell-m,b.y*gCell+gCell-m);
    ctx.moveTo(b.x*gCell+gCell-m,b.y*gCell+m); ctx.lineTo(b.x*gCell+m,b.y*gCell+gCell-m);
    ctx.stroke();
  }

  // Portal connecting lines — grow from each end toward center over 0.8s
  const linePx=Math.max(2,Math.round(5*gScale));
  for(const pp of portalPairs) {
    const t=Math.min(1,(gTime-pp.spawnTime)/0.8);
    const ax=pp.a.x*gCell+gCell/2, ay=pp.a.y*gCell+gCell/2;
    const bx=pp.b.x*gCell+gCell/2, by=pp.b.y*gCell+gCell/2;
    // Each segment grows from its portal to the midpoint
    const eax=ax+(bx-ax)*t*0.5, eay=ay+(by-ay)*t*0.5;
    const ebx=bx+(ax-bx)*t*0.5, eby=by+(ay-by)*t*0.5;
    ctx.strokeStyle=rgbA(pp.color,0.62);
    ctx.lineWidth=linePx;
    ctx.beginPath();
    ctx.moveTo(ax,ay); ctx.lineTo(eax,eay);
    ctx.moveTo(bx,by); ctx.lineTo(ebx,eby);
    ctx.stroke();
  }

  // Portal target rings
  for(const pp of portalPairs) {
    const drawPortal=(cell)=>{
      const cx=cell.x*gCell+gCell/2, cy=cell.y*gCell+gCell/2;
      const maxR=gCell*0.47;
      const pulse=(Math.sin(gTime*3.5)+1)*0.5;
      const lw=Math.max(2,gCell/7);
      const [pr,pg,pb]=pp.color;
      for(let ring=0;ring<4;ring++) {
        const r=maxR*(1-ring/4);
        const bright=ring%2===0;
        const a=bright?0.95-ring*0.10:0.55-ring*0.05;
        const fac=bright?1:0.6;
        const rc=Math.min(255,pr*fac+pulse*40)|0;
        const gc=Math.min(255,pg*fac+pulse*20)|0;
        const bc=Math.min(255,pb*fac+pulse*40)|0;
        ctx.strokeStyle=`rgba(${rc},${gc},${bc},${a})`;
        ctx.lineWidth=lw;
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      }
      // Bright center dot
      ctx.fillStyle=`rgba(${Math.min(255,pr+100)},${Math.min(255,pg+100)},${Math.min(255,pb+100)},${0.5+pulse*0.4})`;
      ctx.beginPath(); ctx.arc(cx,cy,lw,0,Math.PI*2); ctx.fill();
    };
    drawPortal(pp.a); drawPortal(pp.b);
  }

  // Tunnel powerups
  for(const tp of tunnelPowerups) {
    const tx=tp.x*gCell, ty=tp.y*gCell;
    const pulse=(Math.sin(gTime*5+tp.x*0.7+tp.y*1.3)+1)*0.5;
    const innerR=(gCell/2-5)*(0.75+pulse*0.25);
    ctx.fillStyle=rgb('TUNNEL_OUT');
    ctx.fillRect(tx+2,ty+2,gCell-4,gCell-4);
    ctx.fillStyle=rgbA(C.TUNNEL_OUT,0.28+pulse*0.28);
    ctx.beginPath();ctx.arc(tx+gCell/2,ty+gCell/2,gCell/2-2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=rgb('TUNNEL_IN');
    ctx.beginPath();ctx.arc(tx+gCell/2,ty+gCell/2,innerR,0,Math.PI*2);ctx.fill();
  }

  // Halo powerups
  for(const hp of haloPowerups) {
    const cx=hp.x*gCell+gCell/2, cy=hp.y*gCell+gCell/2;
    const pulse=(Math.sin(gTime*3.5+hp.x*1.1+hp.y*0.9)+1)*0.5;
    const spin=gTime*1.2;
    ctx.fillStyle='rgba(40,32,0,0.85)';
    ctx.fillRect(hp.x*gCell+2,hp.y*gCell+2,gCell-4,gCell-4);
    const r1=(gCell/2-2)*(0.95+0.05*pulse);
    const lw=Math.max(1,gCell/12);
    ctx.lineWidth=lw;
    ctx.strokeStyle=`rgba(255,210,40,${0.6+pulse*0.35})`;
    ctx.beginPath();ctx.arc(cx,cy,r1,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=`rgba(255,230,120,${0.3+pulse*0.15})`;
    ctx.lineWidth=Math.max(1,gCell/16);
    ctx.beginPath();ctx.arc(cx,cy,r1-Math.max(1,gCell/14),0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=`rgba(255,220,80,${0.45+pulse*0.25})`;
    ctx.lineWidth=lw;
    ctx.beginPath();ctx.arc(cx,cy,r1*0.68,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=`rgba(255,240,160,${0.28+pulse*0.22})`;
    ctx.beginPath();ctx.arc(cx,cy,r1*0.36,0,Math.PI*2);ctx.fill();
    // Spinning glints
    for(let g=0;g<4;g++) {
      const ang=spin+g*Math.PI/2;
      ctx.fillStyle='rgba(255,255,200,0.8)';
      ctx.beginPath();
      ctx.arc(cx+Math.cos(ang)*r1,cy+Math.sin(ang)*r1,Math.max(1,gCell/10),0,Math.PI*2);
      ctx.fill();
    }
  }

  // Food
  {
    const age=gTime-foodSpawnTime;
    const t=Math.min(age/0.6,1);
    const sc=3-2*t;
    const bob=Math.sin(gTime*2.8)*(gCell*0.07)*t;
    const pulse=Math.sin(gTime*4.2)*0.10*t;
    const pad=gCell*0.14-gCell*0.10*pulse;
    const fsz=Math.max(2,gCell*sc-2*pad);
    const off=(gCell-gCell*sc)*0.5;
    ctx.fillStyle=rgb('FOOD');
    ctx.fillRect(food.x*gCell+off+pad, food.y*gCell+off+pad+bob, fsz, fsz);
    const shine=Math.max(2,fsz/5);
    ctx.fillStyle='rgba(255,160,160,0.7)';
    ctx.fillRect(food.x*gCell+off+pad+2, food.y*gCell+off+pad+2+bob, shine, shine);
  }

  // Ghost trail
  for(let i=snake.length-1;i>=1;i--) {
    if(snakeGhost[i]) {
      ctx.fillStyle=rgbA(C.GHOST,0.22);
      ctx.fillRect(snake[i].x*gCell+3,snake[i].y*gCell+3,gCell-6,gCell-6);
    }
  }

  // Snake body (tail fade: last 30% of segments fade to 55% alpha)
  const bCol=phaseTicks>0?C.PHASE_BODY:C.BODY;
  const fadeStart=snake.length-Math.max(1,(snake.length*0.3)|0);
  for(let i=snake.length-1;i>=1;i--) {
    if(!snakeGhost[i]) {
      let a=i>=fadeStart?0.55+(1-0.55)*(1-(i-fadeStart)/(snake.length-fadeStart)):1.0;
      if(phaseTicks>0) a=Math.min(a,0.78);
      ctx.fillStyle=rgbA(bCol,a);
      ctx.fillRect(snake[i].x*gCell+2,snake[i].y*gCell+2,gCell-4,gCell-4);
    }
  }

  // Head
  const hCol=phaseTicks>0?C.PHASE_HEAD:C.HEAD;
  ctx.fillStyle=rgbA(hCol);
  ctx.fillRect(snake[0].x*gCell+1,snake[0].y*gCell+1,gCell-2,gCell-2);

  // Eyes
  const eOff=Math.round(gCell*0.22), eSz=Math.max(2,Math.round(gCell*0.18));
  const px=-dir.y, py=dir.x; // perpendicular
  const ecx=snake[0].x*gCell+gCell/2, ecy=snake[0].y*gCell+gCell/2;
  ctx.fillStyle='rgba(0,0,0,0.85)';
  ctx.fillRect(ecx+dir.x*eOff+px*eOff-eSz/2, ecy+dir.y*eOff+py*eOff-eSz/2, eSz, eSz);
  ctx.fillRect(ecx+dir.x*eOff-px*eOff-eSz/2, ecy+dir.y*eOff-py*eOff-eSz/2, eSz, eSz);

  ctx.restore(); // end board translate

  // Particles (board-relative coords → screen)
  drawFX(ox, oy);

  // Tunnel charge icons — left margin
  if(tunnelCharges>0||phaseTicks>0) {
    const iSz=Math.max(10,gCell*0.55|0);
    const iGap=iSz+Math.max(3,gCell*0.15|0);
    const ix=gBoardX/2-iSz/2|0;
    const lFsz=Math.max(8,TS(11));
    drawText('TUNNEL',ix,gBoardY-lFsz-TS(4),lFsz,'rgba(160,220,255,0.7)');
    const show=Math.min(tunnelCharges,10);
    for(let ci=0;ci<show;ci++) {
      const iy=gBoardY+ci*iGap;
      const pulse=0.5+0.5*Math.sin(gTime*3+ci*0.5);
      const a=0.7+pulse*0.3;
      ctx.fillStyle=`rgba(160,220,255,${a})`;
      ctx.fillRect(ix+iSz/4,iy,iSz/2,iSz);
      ctx.fillRect(ix,iy+iSz/4,iSz,iSz/2);
    }
    if(phaseTicks>0) {
      const glow=0.5+0.5*Math.sin(gTime*8);
      const iy=gBoardY+show*iGap+Math.max(2,gCell*0.1|0);
      ctx.strokeStyle=`rgba(${180+glow*75|0},${220+glow*35|0},255,${0.78+glow*0.22})`;
      ctx.lineWidth=2;
      ctx.strokeRect(ix-2,iy-2,iSz+4,iSz+4);
      ctx.fillStyle=`rgba(${180+glow*75|0},${220+glow*35|0},255,${0.78+glow*0.22})`;
      ctx.fillRect(ix+iSz/4,iy,iSz/2,iSz);
      ctx.fillRect(ix,iy+iSz/4,iSz,iSz/2);
    }
  }

  // Halo charge icons — right margin
  if(haloCharges>0) {
    const iSz=Math.max(10,gCell*0.55|0);
    const iGap=iSz+Math.max(3,gCell*0.15|0);
    const rx=gBoardX+gCell*COLS, rw=W-rx;
    const ix=rx+rw/2-iSz/2|0;
    const lFsz=Math.max(8,TS(11));
    drawText('HALO',ix,gBoardY-lFsz-TS(4),lFsz,'rgba(255,220,80,0.7)');
    const show=Math.min(haloCharges,10);
    for(let ci=0;ci<show;ci++) {
      const iy=gBoardY+ci*iGap;
      const cx2=ix+iSz/2, cy2=iy+iSz/2;
      const pulse=0.5+0.5*Math.sin(gTime*2.5+ci*0.7);
      const a=0.7+pulse*0.3;
      ctx.strokeStyle=`rgba(255,210,40,${a})`;
      ctx.lineWidth=Math.max(1,iSz/8);
      ctx.beginPath();ctx.arc(cx2,cy2,iSz/2,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle=`rgba(255,240,160,${0.3+pulse*0.25})`;
      ctx.beginPath();ctx.arc(cx2,cy2,iSz/4,0,Math.PI*2);ctx.fill();
      const spin=gTime*1.5+ci*0.8;
      for(let g=0;g<4;g++) {
        const ang=spin+g*Math.PI/2;
        ctx.fillStyle='rgba(255,255,200,0.75)';
        ctx.beginPath();
        ctx.arc(cx2+Math.cos(ang)*iSz/2,cy2+Math.sin(ang)*iSz/2,Math.max(1,iSz/8),0,Math.PI*2);
        ctx.fill();
      }
    }
  }

  // UI bar
  const barY=gBoardY+gCell*ROWS;
  ctx.fillStyle=rgb('UI_BG');
  ctx.fillRect(0,barY,W,gUiH);
  ctx.fillStyle='rgba(45,45,45,1)';
  ctx.fillRect(0,barY,W,1);
  const barMid=barY+(gUiH-TS(20))/2|0;
  const tNorm=TS(20);
  const pts=1+(stepCount/100|0);
  const scoreStr=`SCORE  ${score}`;
  drawText(scoreStr,gBoardX,barMid,tNorm,'#fff');
  if(pts>1) {
    const sw=measured(scoreStr,tNorm);
    drawText(`x${pts}`,gBoardX+sw+TS(6),barMid+tNorm/3|0,TS(14),'gold');
  }
  const hsStr=`BEST  ${personalBest}`;
  drawText(hsStr,gBoardX+gCell*COLS,barMid,tNorm,'#dddd44','right');
  // Center: tunnel active / hint
  if(phaseTicks>0) {
    const s=`TUNNELING  ${phaseTicks}`;
    centered(s,barMid,tNorm,rgbA(C.PHASE_HEAD));
  } else if(tunnelCharges>0) {
    const hint=hasTouch?'[ TUNNEL ]':'[SPACE] TUNNEL';
    centered(hint,barMid,tNorm,'rgba(160,220,255,0.78)');
    const hw=measured(hint,tNorm);
    addZone((W-hw)/2-12,barY,hw+24,gUiH,()=>{
      if(tunnelCharges>0&&phaseTicks===0){tunnelCharges--;phaseTicks=10;sndTunnelActivate();}
    });
  }

  // Small menu button for touch (top-left corner)
  if(hasTouch) {
    const mbSz=Math.max(34,TS(30));
    drawBtn('\u2630',4,4,mbSz,mbSz,'rgba(30,30,30,0.72)','rgba(200,200,200,0.85)',()=>{state=S.MENU;});
  }

  // Countdown
  if(state===S.PLAY&&startDelay>0) {
    const num=Math.ceil(startDelay);
    const pulse=startDelay-Math.floor(startDelay);
    const sz=TS(96)*(1+pulse*0.4)|0;
    const a=180+pulse*75|0;
    ctx.font=`bold ${sz}px monospace`;
    ctx.fillStyle=`rgba(255,255,255,${a/255})`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(num),W/2,gBoardY+gCell*ROWS/2);
  }
}

function drawDead() {
  ctx.fillStyle='rgba(0,0,0,0.68)';
  ctx.fillRect(0,0,W,H);

  const tLg=TS(56),tMed=TS(32),tNorm=TS(22),tSm=TS(17),tHint=TS(14);
  let y=Math.max(10,(H-H*0.8)/2)|0;

  centered('GAME OVER',y,tLg,'#e03030'); y+=tLg+TS(10);
  centered(`Score: ${score}`,y,tMed,'#fff'); y+=tMed+TS(14);

  if(score>0&&score===personalBest) {
    centered('NEW PERSONAL BEST!',y,tNorm,'#ffdd44'); y+=tNorm+TS(8);
  }
  if(onlineSubmitFeedback>0) {
    centered('Score submitted!',y,tSm,'#88ff88'); y+=tSm+TS(8);
  }

  if(onlineReady&&onlineScores.length) {
    y+=TS(8);
    const tLb=TS(20), tLbRow=TS(19);
    centered('LEADERBOARD',y,tLb,rgb('DIM')); y+=tLb+TS(6);
    const show=Math.min(onlineScores.length,5);
    for(let i=0;i<show;i++) {
      const e=onlineScores[i];
      const col=e.name===playerName?'#ffdd44':rgb('DIM');
      centered(`${i+1}. ${e.name}   ${e.score}`,y,tLbRow,col); y+=tLbRow+TS(4);
    }
    y+=TS(10);
  }

  if(!nameEditing) {
    if (hasTouch) {
      const nh=Math.max(36,TS(28)), nw=Math.min(W*0.68,280)|0, nx=(W-nw)/2|0;
      ctx.fillStyle='rgba(255,255,255,0.05)';
      ctx.fillRect(nx,y,nw,nh);
      centered(`Player: ${playerName}`,y+(nh-tHint)/2|0,tHint,rgb('DIM'));
      addZone(nx,y,nw,nh,()=>{nameEditing=true;nameBuf=playerName;focusNameInput();});
      y+=nh+TS(8);
    } else {
      centered(`Player: ${playerName}  [N to rename]`,y,tHint,rgb('DIM')); y+=tHint+TS(18);
    }
  } else {
    const cur=(Math.floor(gTime*2)%2)?'_':' ';
    const nh=Math.max(36,TS(30)), nw=Math.min(W*0.68,280)|0, nx=(W-nw)/2|0;
    ctx.fillStyle='rgba(255,255,255,0.09)';
    ctx.fillRect(nx,y,nw,nh);
    ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1;
    ctx.strokeRect(nx,y,nw,nh);
    centered(`${nameBuf}${cur}`,y+(nh-tSm)/2|0,tSm,'#fff');
    addZone(nx,y,nw,nh,()=>focusNameInput());
    y+=nh+TS(8);
  }

  if (hasTouch) {
    const bh=Math.max(48,TS(40)), bw=Math.min(260,W*0.62)|0, bx=(W-bw)/2|0;
    drawBtn('\u25ba  PLAY AGAIN',bx,y,bw,bh,'rgba(55,150,55,0.9)','#fff',()=>{ensureAudio();reset();state=S.PLAY;startBgMusic();});
    y+=bh+TS(8);
    const sbh=Math.max(40,TS(34)), sbw=(W*0.43)|0, sgap=TS(6);
    const sbx1=(W/2-sbw-sgap/2)|0, sbx2=(W/2+sgap/2)|0;
    drawBtn('Menu',sbx1,y,sbw,sbh,'rgba(30,30,60,0.85)',rgb('DIM'),()=>{state=S.MENU;fetchLeaderboard();});
    drawBtn('Palette',sbx2,y,sbw,sbh,'rgba(30,30,60,0.85)',rgb('DIM'),()=>{state=S.PALETTE;});
  } else {
    centered('PRESS ENTER TO PLAY AGAIN',y,tNorm,'#fff'); y+=tNorm+TS(8);
    centered('ESC: menu   P: palette',y,tHint,rgb('DIM'));
  }

  drawFX(gBoardX+shakeX|0, gBoardY+shakeY|0);
}

function drawPalette() {
  const tNorm=TS(20), tSm=TS(15), tHint=TS(13);
  const panelW=Math.min(520,W*0.8)|0;
  const panelH=Math.min(600,H*0.85)|0;
  const px=(W-panelW)/2|0, py=(H-panelH)/2|0;

  ctx.fillStyle='rgba(12,12,18,0.96)';
  ctx.fillRect(px,py,panelW,panelH);
  ctx.strokeStyle='rgba(80,80,120,0.8)'; ctx.lineWidth=2;
  ctx.strokeRect(px,py,panelW,panelH);

  const kidx=C_KEYS.indexOf(palEditKey);

  // Reserve bottom strip height for touch controls
  const ctrlH=hasTouch?Math.max(44,TS(40)):0;
  const listH=panelH-80-ctrlH-8;
  const rowH=Math.max(22,listH/C_KEYS.length)|0;

  drawText('PALETTE EDITOR',px+16,py+14,tNorm,'#aaa');
  if (hasTouch) {
    drawText('Tap row \u2022 R/G/B channel \u2022 \u2212/+ value',px+16,py+14+tNorm+6,tHint,'rgba(120,120,160,0.8)');
  } else {
    drawText('\u2191\u2193 select   \u2190\u2192 adjust   Q/E channel   ESC back',px+16,py+14+tNorm+6,tHint,'rgba(120,120,160,0.8)');
  }

  const chNames=['R','G','B'];

  for(let i=0;i<C_KEYS.length;i++) {
    const k=C_KEYS[i];
    const ry=py+72+i*rowH;
    const selected=k===palEditKey;

    if(selected) {
      ctx.fillStyle='rgba(60,60,100,0.5)';
      ctx.fillRect(px+4,ry,panelW-8,rowH);
    }
    // Tap any row to select it
    addZone(px+4,ry,panelW-8,rowH,()=>{palEditKey=k;});

    // Swatch
    ctx.fillStyle=rgb(k);
    ctx.fillRect(px+12,ry+2,rowH-4,rowH-4);
    ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1;
    ctx.strokeRect(px+12,ry+2,rowH-4,rowH-4);

    // Label
    const col=selected?'#fff':'rgba(200,200,200,0.6)';
    drawText(C_LABELS[k]||k, px+12+rowH+4, ry+(rowH-tSm)/2, tSm, col);

    if(selected) {
      // Channel sliders
      const slotX=px+panelW*0.48|0;
      for(let ch=0;ch<3;ch++) {
        const chY=ry+(rowH/4+ch*(rowH/4))|0;
        const val=C[k][ch];
        const barW=(panelW*0.45)|0;
        const chCol=['rgba(255,80,80,0.6)','rgba(80,220,80,0.6)','rgba(80,80,255,0.6)'][ch];
        ctx.fillStyle='rgba(40,40,40,0.8)';
        ctx.fillRect(slotX,chY,barW,Math.max(5,rowH/5));
        ctx.fillStyle=chCol;
        ctx.fillRect(slotX,chY,(barW*val/255)|0,Math.max(5,rowH/5));
        const active=ch===palEditCh;
        const label=`${chNames[ch]}:${val}`;
        drawText(label,slotX+barW+6,chY,tHint,active?'#fff':'rgba(180,180,180,0.5)');
      }
    }
  }

  // Touch control strip at bottom of panel
  if (hasTouch) {
    const ctrlY=py+panelH-ctrlH-4;
    const bkW=Math.max(52,TS(44));
    // Back button
    drawBtn('Back',px+panelW-8-bkW,ctrlY,bkW,ctrlH,'rgba(70,30,30,0.9)','rgba(220,180,180,0.9)',()=>{state=S.MENU;});
    // +/- value buttons
    const adjW=Math.max(44,TS(40)), adjGap=TS(4);
    const adjX2=px+panelW-8-bkW-adjGap-adjW;
    const adjX1=adjX2-adjGap-adjW;
    drawBtn('+',adjX2,ctrlY,adjW,ctrlH,'rgba(30,65,30,0.9)','#8f8',()=>{C[palEditKey][palEditCh]=Math.min(255,C[palEditKey][palEditCh]+5);});
    drawBtn('\u2212',adjX1,ctrlY,adjW,ctrlH,'rgba(65,30,30,0.9)','#f88',()=>{C[palEditKey][palEditCh]=Math.max(0,C[palEditKey][palEditCh]-5);});
    // R/G/B channel selector
    const chAreaW=adjX1-px-12;
    const chW=(chAreaW/3-3)|0;
    ['R','G','B'].forEach((ch,i)=>{
      const tx=px+8+i*(chW+4);
      const act=i===palEditCh;
      const chFill=['rgba(80,20,20,0.9)','rgba(20,60,20,0.9)','rgba(20,20,80,0.9)'][i];
      drawBtn(ch,tx,ctrlY,chW,ctrlH,act?chFill.replace('0.9','0.95')+'':'rgba(25,25,35,0.8)',act?'#fff':'rgba(150,150,180,0.6)',()=>{palEditCh=i;});
    });
    // ▲/▼ navigation beside title
    const navSz=Math.max(32,TS(28));
    drawBtn('\u25b2',px+panelW-navSz-6,py+10,navSz,navSz,'rgba(40,40,70,0.85)',rgb('DIM'),()=>{palEditKey=C_KEYS[(kidx-1+C_KEYS.length)%C_KEYS.length];});
    drawBtn('\u25bc',px+panelW-navSz-6,py+10+navSz+4,navSz,navSz,'rgba(40,40,70,0.85)',rgb('DIM'),()=>{palEditKey=C_KEYS[(kidx+1)%C_KEYS.length];});
  }
}

function drawFX(boardOx=0, boardOy=0) {
  // Particles
  for(const p of particles) {
    const t=p.li/p.liMax;
    ctx.fillStyle=rgbA(p.col,t);
    const s=p.sz*t;
    ctx.fillRect(boardOx+p.x-s/2, boardOy+p.y-s/2, s, s);
  }
  // Float texts
  const fSz=TS(16);
  for(const f of floatTexts) {
    const a=Math.min(1,f.li*2);
    ctx.font=`bold ${fSz}px monospace`;
    ctx.fillStyle=rgbA(f.col,a);
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(f.text, boardOx+f.x, boardOy+f.y);
  }
}

// ================================================================
// MAIN LOOP
// ================================================================
let last=0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt=Math.min((ts-last)/1000, 0.05);
  last=ts;
  // Clear jp after update so pressed() is per-frame
  update(dt);
  draw();
  // Reset just-pressed at end of frame
  for(const k in jp) jp[k]=false;
}
requestAnimationFrame(ts => { last=ts; requestAnimationFrame(loop); });
</script>
